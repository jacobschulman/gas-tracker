name: Scrape Gas Prices

on:
  schedule:
    # Run daily at 2pm UTC (10am ET)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run full backfill (scrape all 51 state pages for historical data)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            npx ts-node src/main.ts --backfill
          else
            npx ts-node src/main.ts --quick
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ api/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: update gas prices $(date -u +%Y-%m-%d)"
            git push
          fi
