name: Scrape Gas Prices

on:
  schedule:
    # Run daily at 2pm UTC (10am ET)
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Run full backfill (scrape all 51 state pages for historical data)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            npx ts-node src/main.ts --backfill
          else
            npx ts-node src/main.ts --quick
          fi

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ api/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "data: update gas prices $(date -u +%Y-%m-%d)"
          # Pull with rebase to handle any commits pushed while we were scraping
          # Retry up to 3 times in case of concurrent pushes
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push failed (attempt $i), retrying..."
            sleep 5
          done

      - name: Trigger Pages deployment
        if: success()
        run: gh workflow run pages.yml
        env:
          GH_TOKEN: ${{ github.token }}
